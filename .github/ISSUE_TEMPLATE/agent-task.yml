name: "Agent Task (JR)"
description: "Strict task template for the JR runner (Forms/Validators focus)"
title: "[JR] "
labels: ["jr"]
body:
  - type: markdown
    attributes:
      value: |
        This issue is a contract for the JR runner.
        Keep it small. No extra scope.

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: "What exactly should be built? (1–2 lines)"
      placeholder: "Implement a custom validator and show its error message in the demo form."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Allowed scope
      description: "What parts of the app can be touched?"
      placeholder: |
        - Only angularApp/src/app/... (Forms/Validators related)
        - No routing changes
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: "What must NOT be done?"
      placeholder: |
        - Do not add routing
        - Do not add new dependencies
        - Do not redesign UI
    validations:
      required: true

  - type: checkboxes
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: "Must be verifiable"
      options:
        - label: "ng build passes"
          required: true
        - label: "ng test --watch=false passes"
          required: true
        - label: "No changes to package.json / package-lock.json"
          required: true
        - label: "Includes Jasmine unit tests for validators (if validators added/changed)"
          required: false

  - type: textarea
    id: details
    attributes:
      label: Details / Examples
      description: "Provide expected behavior, examples, edge cases"
      placeholder: |
        Example:
        - Input: 'abc' -> error: { myRule: true }
        - Input: 'abcd' -> valid
    validations:
      required: false